<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Select your location</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    #map {
      height: 100vh;
      width: 100%;
    }

    #info {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px 16px;
      z-index: 2000;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
  </style>
</head>

<body>

<div id="info">
  Zoom in and click approximately where you lived (±5 km is enough). Your exact address is not needed.
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var surveyURL = "https://eruni.qualtrics.com/jfe/form/SV_3lMCzMLqahGvi0G";

// 🇺🇦 bounds
var bounds = L.latLngBounds(
  L.latLng(44.0, 22.0),
  L.latLng(53.5, 40.5)
);

// 🔥 OPTIMIZED MAP
var map = L.map('map', {
  maxBounds: bounds,
  maxBoundsViscosity: 1.0,
  minZoom: 6,
  maxZoom: 18,
  worldCopyJump: false,

  zoomAnimation: false,
  fadeAnimation: false,
  markerZoomAnimation: false,

  inertia: false,
  preferCanvas: true
});

map.fitBounds(bounds);

map.on('drag', function() {
  map.panInsideBounds(bounds, { animate: false });
});

// 🔥 FAST TILE LAYER (Carto)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap & Carto',
  subdomains: 'abcd',
  maxZoom: 19,

  noWrap: true,
  updateWhenIdle: true,
  updateWhenZooming: false,
  keepBuffer: 4
}).addTo(map);

var marker;
var ukraineLayer;

// 🇺🇦 hranice
fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries/UKR.geo.json')
  .then(res => res.json())
  .then(data => {

    ukraineLayer = L.geoJSON(data, {
      style: {
        color: "#d00",
        weight: 2,
        fillColor: "#d00",
        fillOpacity: 0.05
      }
    }).addTo(map);

  });

// 🔥 point in polygon
function isInsideUkraine(latlng) {
  if (!ukraineLayer) return false;

  var inside = false;

  ukraineLayer.eachLayer(function(layer) {
    var poly = layer.getLatLngs();

    function pointInPoly(point, vs) {
      var x = point.lng, y = point.lat;
      var inside = false;

      for (var i = 0, j = vs.length - 1; i < vs.length; j = i++) {
        var xi = vs[i].lng, yi = vs[i].lat;
        var xj = vs[j].lng, yj = vs[j].lat;

        var intersect =
          ((yi > y) != (yj > y)) &&
          (x < (xj - xi) * (y - yi) / (yj - yi) + xi);

        if (intersect) inside = !inside;
      }

      return inside;
    }

    if (Array.isArray(poly[0])) {
      poly.forEach(function(p) {
        if (pointInPoly(latlng, p)) inside = true;
      });
    } else {
      if (pointInPoly(latlng, poly)) inside = true;
    }
  });

  return inside;
}

// 📍 klik
map.on('click', function(e) {

  if (!isInsideUkraine(e.latlng)) {
    document.getElementById("info").innerHTML =
      "Please click inside Ukraine";
    return;
  }

  if (marker) {
    marker.setLatLng(e.latlng);
  } else {
    marker = L.marker(e.latlng).addTo(map);
  }

  var lat = e.latlng.lat.toFixed(5);
  var lng = e.latlng.lng.toFixed(5);

  document.getElementById("info").innerHTML =
    "Selected: " + lat + ", " + lng + "<br>Redirecting...";

  var separator = surveyURL.includes("?") ? "&" : "?";

  setTimeout(function() {
    window.location.href = surveyURL + separator + "lat=" + lat + "&lng=" + lng;
  }, 800);

});

</script>

</body>
</html>

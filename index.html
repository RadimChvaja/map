<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Select your location</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    #map {
      height: 100vh;
      width: 100%;
    }

    #info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px 16px;
      z-index: 1000;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
  </style>
</head>

<body>

<div id="info">
  Zoom in and click approximately where you lived (±5 km is enough)
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  var surveyURL = "https://eruni.qualtrics.com/jfe/form/SV_3lMCzMLqahGviOG";

  // 🇺🇦 hranice Ukrajiny (přibližné)
  var bounds = [
    [44.0, 22.0], // SW
    [53.5, 40.5]  // NE
  ];

  var map = L.map('map', {
    maxBounds: bounds,
    maxBoundsViscosity: 1.0,
    minZoom: 6,
    maxZoom: 18
  }).setView([49, 31], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 18
  }).addTo(map);

  var marker;

  map.on('click', function(e) {

    if (marker) {
      marker.setLatLng(e.latlng);
    } else {
      marker = L.marker(e.latlng).addTo(map);
    }

    var lat = e.latlng.lat.toFixed(5);
    var lng = e.latlng.lng.toFixed(5);

    document.getElementById("info").innerHTML =
      "Selected: " + lat + ", " + lng + "<br>Redirecting...";

    var separator = surveyURL.includes("?") ? "&" : "?";

    setTimeout(function() {
      window.location.href = surveyURL + separator + "lat=" + lat + "&lng=" + lng;
    }, 800);

  });

</script>

</body>
</html>

<script>

function getParam(name) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}

var returnURL = getParam("returnUrl");

// bounds UA
var bounds = L.latLngBounds(
  L.latLng(44.0, 22.0),
  L.latLng(53.5, 40.5)
);

var map = L.map('map', {
  maxBounds: bounds,
  maxBoundsViscosity: 1.0,
  minZoom: 6,
  maxZoom: 18,
  inertia: false
});

map.fitBounds(bounds);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap & Carto',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

var marker;
var circle;
var hoverCircle;
var ukraineLayer;

// hranice UA
fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries/UKR.geo.json')
  .then(res => res.json())
  .then(data => {
    ukraineLayer = L.geoJSON(data, {
      style: {
        color: "#d00",
        weight: 2,
        fillOpacity: 0.05
      }
    }).addTo(map);
  });

// jitter
function randomPointInRadius(lat, lng, radiusKm) {
  const radiusInDegrees = radiusKm / 111;

  const u = Math.random();
  const v = Math.random();
  const w = radiusInDegrees * Math.sqrt(u);
  const t = 2 * Math.PI * v;

  return {
    lat: lat + w * Math.cos(t),
    lng: lng + w * Math.sin(t) / Math.cos(lat * Math.PI / 180)
  };
}

// hover
map.on('mousemove', function(e) {
  if (hoverCircle) {
    hoverCircle.setLatLng(e.latlng);
  } else {
    hoverCircle = L.circle(e.latlng, {
      radius: 5000,
      color: '#3388ff',
      fillOpacity: 0.05,
      interactive: false
    }).addTo(map);
  }
});

// CLICK
map.on('click', function(e) {

  if (!returnURL) {
    alert("Missing return URL");
    return;
  }

  var jittered = randomPointInRadius(e.latlng.lat, e.latlng.lng, 5);

  var lat = jittered.lat.toFixed(5);
  var lng = jittered.lng.toFixed(5);

  // decode + přidej parametry
  var url = decodeURIComponent(returnURL);

  url += (url.includes('?') ? '&' : '?') + "lat=" + lat + "&lng=" + lng;

  window.location.replace(url);

});

</script>

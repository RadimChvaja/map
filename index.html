<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Select your location</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    #map {
      height: 100vh;
      width: 100%;
    }

    #info {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px 16px;
      z-index: 2000;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
  </style>
</head>

<body>

<div id="info">
  Move your cursor and click approximately where you lived (±5 km is enough).
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ✅ GET RETURN URL + FIX ENCODING
function getParam(name) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}

var responseId = getParam("responseId");
var baseURL = "https://eruni.qualtrics.com/jfe/form/SV_3lMCzMLqahGviOG";

var surveyURL = baseURL + "?Q_R=" + responseId;
  
if (surveyURL) {
  surveyURL = decodeURIComponent(surveyURL);
} else {
  document.getElementById("info").innerHTML =
    "Error: missing return link. Please go back and try again.";
}

// bounds UA
var bounds = L.latLngBounds(
  L.latLng(44.0, 22.0),
  L.latLng(53.5, 40.5)
);

var map = L.map('map', {
  maxBounds: bounds,
  maxBoundsViscosity: 1.0,
  minZoom: 6,
  maxZoom: 18,
  inertia: false
});

map.fitBounds(bounds);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap & Carto',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

var marker;
var circle;
var hoverCircle;
var ukraineLayer;

// ✅ STABLE GEOJSON (hranice fungují)
fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries/UKR.geo.json')
  .then(res => res.json())
  .then(data => {
    ukraineLayer = L.geoJSON(data, {
      style: {
        color: "#d00",
        weight: 2,
        fillOpacity: 0.05
      }
    }).addTo(map);
  });

// jitter
function randomPointInRadius(lat, lng, radiusKm) {
  const radiusInDegrees = radiusKm / 111;

  const u = Math.random();
  const v = Math.random();
  const w = radiusInDegrees * Math.sqrt(u);
  const t = 2 * Math.PI * v;

  return {
    lat: lat + w * Math.cos(t),
    lng: lng + w * Math.sin(t) / Math.cos(lat * Math.PI / 180)
  };
}

// inside UA
function isInsideUkraine(latlng) {
  if (!ukraineLayer) return true;

  var inside = false;

  ukraineLayer.eachLayer(function(layer) {
    if (layer.getBounds().contains(latlng)) {
      inside = true;
    }
  });

  return inside;
}

// hover circle
map.on('mousemove', function(e) {
  if (hoverCircle) {
    hoverCircle.setLatLng(e.latlng);
  } else {
    hoverCircle = L.circle(e.latlng, {
      radius: 5000,
      color: '#3388ff',
      fillOpacity: 0.05,
      interactive: false
    }).addTo(map);
  }
});

// click
map.on('click', function(e) {

  if (!surveyURL) return;

  if (!isInsideUkraine(e.latlng)) {
    document.getElementById("info").innerHTML =
      "Please click inside Ukraine";
    return;
  }

  if (marker) marker.setLatLng(e.latlng);
  else marker = L.marker(e.latlng).addTo(map);

  if (circle) map.removeLayer(circle);

  circle = L.circle(e.latlng, {
    radius: 5000,
    color: '#3388ff',
    fillOpacity: 0.15
  }).addTo(map);

  var jittered = randomPointInRadius(e.latlng.lat, e.latlng.lng, 5);

  var lat = jittered.lat.toFixed(5);
  var lng = jittered.lng.toFixed(5);

  document.getElementById("info").innerHTML =
    "Selected area (~5 km radius). Returning to survey...";

  try {
    var url = new URL(surveyURL);
    url.searchParams.set("lat", lat);
    url.searchParams.set("lng", lng);

    setTimeout(function() {
      window.location.replace(url.toString());
    }, 600);

  } catch (e) {
    document.getElementById("info").innerHTML =
      "Error returning to survey.";
  }

});

</script>

</body>
</html>

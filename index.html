<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Select your location</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    #map {
      height: 100vh;
      width: 100%;
    }

    #info {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px 16px;
      z-index: 2000;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
  </style>
</head>

<body>

<div id="info">
  Click approximately where you lived (±5 km is enough).
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var surveyURL = "https://eruni.qualtrics.com/jfe/form/SV_3lMCzMLqahGviOG";

// map
var map = L.map('map').setView([49, 32], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap & Carto'
}).addTo(map);

// jitter
function randomPointInRadius(lat, lng, radiusKm) {
  const radiusInDegrees = radiusKm / 111;
  const u = Math.random();
  const v = Math.random();
  const w = radiusInDegrees * Math.sqrt(u);
  const t = 2 * Math.PI * v;

  return {
    lat: lat + w * Math.cos(t),
    lng: lng + w * Math.sin(t) / Math.cos(lat * Math.PI / 180)
  };
}

// click
map.on('click', function(e) {

  var jittered = randomPointInRadius(e.latlng.lat, e.latlng.lng, 5);

  var lat = jittered.lat.toFixed(5);
  var lng = jittered.lng.toFixed(5);

  var url = surveyURL + "?lat=" + lat + "&lng=" + lng;

  window.location.href = url;

});

</script>

</body>
</html>
